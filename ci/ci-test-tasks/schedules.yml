schedules:
- cron: "22 10 * * *"
  displayName: Daily
  branches:
    include:
      - master
  always: true

trigger: none
pr: none

variables:
  SCHEDULED_TASKS: "AzureAppServiceManageV0,AzureAppServiceSettingsV1,AzureCLIV1,AzureCLIV2,AzureCloudPowerShellDeploymentV1,AzureCloudPowerShellDeploymentV2,AzureContainerAppsV0,AzureContainerAppsV1,AzureFileCopyV1,AzureFileCopyV2,AzureFileCopyV3,AzureFileCopyV4,AzureFileCopyV5,AzureFileCopyV6,AzureFunctionAppV1,AzureFunctionAppV2,AzureFunctionAppContainerV1,AzureFunctionOnKubernetesV0,AzureFunctionOnKubernetesV1,AzureFunctionV1,AzureKeyVaultV1,AzureKeyVaultV2,AzureMonitorV0,AzureMonitorV1,AzureMysqlDeploymentV1,AzureNLBManagementV1,AzurePolicyV0,AzurePowerShellV2,AzurePowerShellV3,AzurePowerShellV4,AzurePowerShellV5,AzureResourceGroupDeploymentV2,AzureResourceManagerTemplateDeploymentV3,AzureRmWebAppDeploymentV3,AzureRmWebAppDeploymentV4,AzureRmWebAppDeploymentV5,AzureWebAppV1,AzureWebAppContainerV1,AzureVmssDeploymentV0,AzureVmssDeploymentV1,ChefV1,ChefKnifeV1,ContainerBuildV0,DelayV1,DockerV0,DockerV1,DockerV2,DockerComposeV0,DockerComposeV1,DockerInstallerV0,DownloadBuildArtifactsV0,DownloadFileshareArtifactsV1,DownloadGitHubNpmPackageV1,DownloadGitHubNugetPackageV1,DownloadGitHubReleaseV0,FileTransformV1,FileTransformV2,FuncToolsInstallerV0,GitHubReleaseV0,GitHubReleaseV1,GoV0,GoToolV0,HelmDeployV0,HelmDeployV1,HelmInstallerV0,HelmInstallerV1,IISWebAppDeployment,IISWebAppDeploymentOnMachineGroupV0,IISWebAppManagementOnMachineGroupV0,InvokeRestApiV1,JenkinsDownloadArtifactsV1,JenkinsDownloadArtifactsV2,KubectlInstallerV0,KubeloginInstallerV0,KubernetesV0,KubernetesV1,KubernetesManifestV0,KubernetesManifestV1"

jobs:

# Step 1 — Generate matrix dynamically
- job: generate_matrix
  displayName: Generate task matrix
  pool:
    vmImage: ubuntu-latest

  steps:

  - bash: |
      echo "Generating matrix..."

      IFS=',' read -ra TASKS <<< "$(SCHEDULED_TASKS)"

      json="{"

      for task in "${TASKS[@]}"
      do
        json="$json\"$task\": {\"TASK_NAME\": \"$task\"},"
      done

      json="${json%,}"
      json="$json}"

      echo "Matrix: $json"

      echo "##vso[task.setvariable variable=taskMatrix;isOutput=true]$json"

    name: matrix

# Step 2 — Run tasks in parallel
- job: run_task_tests
  displayName: Run scheduled task CI tests
  dependsOn: generate_matrix
  timeoutInMinutes: 360

  pool:
    vmImage: ubuntu-latest

  strategy:
    maxParallel: 10
    matrix: $[ dependencies.generate_matrix.outputs['matrix.taskMatrix'] ]

  steps:

  - task: NodeTool@0
    displayName: Use Node 20.x
    inputs:
      versionSpec: 20.x

  - script: |
      cd ./ci/ci-test-tasks/test-and-verify-v2
      npm install
      npm run build
    displayName: Build test runner

  - bash: |
      echo "Running tests for task: $(TASK_NAME)"

      node ./ci/ci-test-tasks/test-and-verify-v2 \
        $(System.AccessToken) \
        $(ADOUrl) \
        $(System.TeamProject) \
        $(TASK_NAME)

    displayName: Run CI test
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)