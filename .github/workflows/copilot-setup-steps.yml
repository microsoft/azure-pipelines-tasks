name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The repo .npmrc has always-auth=true (needed for CI with NpmAuthenticate).
      # For the cloud agent, the feed is public so we override at user-level to skip auth.
      - name: Override always-auth for public feed
        run: |
          echo "//pkgs.dev.azure.com/mseng/PipelineTools/_packaging/PipelineTools_PublicPackages/npm/:always-auth=false" >> ~/.npmrc
          echo "//pkgs.dev.azure.com/mseng/PipelineTools/_packaging/PipelineTools_PublicPackages/npm/registry/:always-auth=false" >> ~/.npmrc
          echo "Disabled always-auth for public ADO feed"

      # Pre-fetch sprint data before the firewall blocks whatsprintis.it
      # The hook and agent instructions need this for version bumping
      - name: Cache sprint data
        run: |
          SPRINT_JSON=$(curl -sf --max-time 10 "https://whatsprintis.it/?json" || echo '{}')
          echo "$SPRINT_JSON" > /tmp/sprint-data.json
          mkdir -p "$HOME/.copilot-cache"
          echo "$SPRINT_JSON" > "$HOME/.copilot-cache/sprint-data.json"
          echo "Sprint data cached: $SPRINT_JSON"

      # Install root dependencies while network is unrestricted
      - name: Install root dependencies
        run: npm ci --ignore-scripts || echo "Root npm ci failed — non-blocking"

      # Download and install upgrade-risk-analyzer MCP tool
      # The binary must be available at runtime for the MCP server to work
      - name: Install upgrade-risk-analyzer
        run: |
          mkdir -p "$HOME/.copilot-tools"
          curl -sfL --max-time 30 \
            "https://github.com/nicktrienenern/upgrade-risk-analyzer/releases/latest/download/UpgradeRiskAnalyzer-linux-x64" \
            -o "$HOME/.copilot-tools/upgrade-risk-analyzer" || echo "Download failed — placeholder"
          chmod +x "$HOME/.copilot-tools/upgrade-risk-analyzer" 2>/dev/null || true
          echo "upgrade-risk-analyzer installed at $HOME/.copilot-tools/"

      - name: Verify setup
        run: |
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
          echo "npm config registry: $(npm config get registry)"
          echo "Sprint cache: $(cat $HOME/.copilot-cache/sprint-data.json 2>/dev/null || echo 'not cached')"
