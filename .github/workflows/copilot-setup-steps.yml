name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Override the ADO feed registry with public npmjs.org for the agent.
      # The repo .npmrc points to an ADO feed that gets blocked by the firewall.
      # Since all packages are public npm packages, we use npmjs.org directly.
      - name: Configure npm for public registry
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "Configured npm to use public registry (bypasses ADO feed)"

      # Pre-fetch sprint data before the firewall blocks whatsprintis.it
      # The hook and agent instructions need this for version bumping
      - name: Cache sprint data
        run: |
          SPRINT_JSON=$(curl -sf --max-time 10 "https://whatsprintis.it/?json" || echo '{}')
          echo "$SPRINT_JSON" > /tmp/sprint-data.json
          mkdir -p "$HOME/.copilot-cache"
          echo "$SPRINT_JSON" > "$HOME/.copilot-cache/sprint-data.json"
          echo "Sprint data cached: $SPRINT_JSON"

      # Install root dependencies while network is unrestricted
      - name: Install root dependencies
        run: npm ci --ignore-scripts || echo "Root npm ci failed — non-blocking"

      - name: Verify setup
        run: |
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
          echo "npm config registry: $(npm config get registry)"
          echo "Sprint cache: $(cat $HOME/.copilot-cache/sprint-data.json 2>/dev/null || echo 'not cached')"
