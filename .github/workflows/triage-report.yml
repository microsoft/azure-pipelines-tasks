name: Triage report (reusable)

# Reusable workflow that builds a scoped GitHub issue triage report and emails it.
#
# Scope is defined by any combination of:
#   * areas  - Area labels to include (e.g. "Area: Release, Area:RM")
#   * owners - CODEOWNERS handles whose owned Tasks/ are included (e.g. "@manolerazvan")
#
# The report always renders to the run's job summary. Email is sent only when the
# SMTP_* secrets are provided, so this is safe to run before mail is configured.
#
# Call it from a per-team caller workflow (see triage-report-release-rm.yml) so
# several teams can reuse this engine with their own inputs and mail secrets.
# It can also be run directly via "Run workflow" (supply at least one of areas /
# owners); email is sent only if MAIL_TO + SMTP_SERVER secrets exist, otherwise
# the report is available in the run's job summary.

on:
  workflow_call:
    inputs:
      areas:
        description: 'Comma-separated Area labels to include (e.g. "Area: Release, Area:RM")'
        type: string
        required: false
        default: ''
      owners:
        description: 'Space/comma separated CODEOWNERS handles; their owned Tasks/ are in scope'
        type: string
        required: false
        default: ''
      report_title:
        description: 'Report title / email subject prefix'
        type: string
        required: false
        default: 'Triage Report'
      top_tasks:
        description: 'How many top tasks to list'
        type: string
        required: false
        default: '12'
      weeks:
        description: 'Number of trailing weeks for the dynamics columns'
        type: string
        required: false
        default: '4'
    secrets:
      MAIL_TO:
        required: false
      MAIL_FROM:
        required: false
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      areas:
        description: 'Comma-separated Area labels to include (e.g. "Area: Release, Area:RM")'
        type: string
        required: false
        default: ''
      owners:
        description: 'Space/comma separated CODEOWNERS handles; their owned Tasks/ are in scope'
        type: string
        required: false
        default: ''
      report_title:
        description: 'Report title / email subject prefix'
        type: string
        required: false
        default: 'Triage Report'
      top_tasks:
        description: 'How many top tasks to list'
        type: string
        required: false
        default: '12'
      weeks:
        description: 'Number of trailing weeks for the dynamics columns'
        type: string
        required: false
        default: '4'

permissions:
  issues: read
  contents: read

jobs:
  triage-report:
    runs-on: ubuntu-latest
    name: Build and send triage report
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Install runtime deps from the ADO public Azure Artifacts feed (an npmjs
      # upstream) to comply with CFS requirements. The feed allows anonymous
      # read. We install in an isolated directory outside the checkout so npm
      # uses only this local .npmrc (the repo root .npmrc, which sets
      # always-auth=true and would force auth, is not on npm's config search
      # path from here).
      - name: Install dependencies (ADO public feed)
        env:
          ADO_FEED: https://pkgs.dev.azure.com/mseng/PipelineTools/_packaging/PipelineTools_PublicPackages/npm/registry/
        run: |
          mkdir -p "$RUNNER_TEMP/triage"
          cd "$RUNNER_TEMP/triage"
          echo "registry=$ADO_FEED" > .npmrc
          npm install --no-save --registry="$ADO_FEED" @octokit/rest@18.12.0 nodemailer@6

      - name: Generate and send report
        run: node ci/triage-report.js
        env:
          NODE_PATH: ${{ runner.temp }}/triage/node_modules
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          AREAS: ${{ inputs.areas }}
          OWNERS: ${{ inputs.owners }}
          REPORT_TITLE: ${{ inputs.report_title }}
          TOP_TASKS: ${{ inputs.top_tasks }}
          WEEKS: ${{ inputs.weeks }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
